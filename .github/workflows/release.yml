name: release

# Build cross-platform binaries and attach them to a GitHub Release whenever a
# semver tag is pushed (e.g. v0.1.0). Also runnable on demand.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # required to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        run: ./scripts/build-release.sh "${{ steps.v.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.v.outputs.version }}" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --title "${{ steps.v.outputs.version }}" \
            --generate-notes
